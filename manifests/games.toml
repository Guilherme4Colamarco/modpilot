# ── Grand Theft Auto V ───────────────────────────────────────

[games.gtav]
name = "Grand Theft Auto V"

[games.gtav.identifiers]
steam_app_id = 271590
heroic_names = ["Grand Theft Auto V", "GTA V"]

[games.gtav.tools.openiv]
name = "OpenIV"
description = "Gerenciador principal para mods da engine RAGE"
winetricks = ["dotnet48", "corefonts", "msxml6", "d3dcompiler_47"]
download_url = "https://openiv.com/WebSetup/oivsetup.exe"
executable_path = "drive_c/Program Files/OpenIV/OpenIV.exe"

[games.gtav.tools.scripthookv]
name = "ScriptHookV"
description = "Permite o uso de scripts .asi no jogo"
winetricks = ["vcrun2022"]
download_url = "http://www.dev-c.com/files/ScriptHookV_1.0.3095.0.zip"

[games.gtav.tools.scripthookvdotnet]
name = "ScriptHookVDotNet"
description = "Permite mods .NET no GTA V"
winetricks = ["dotnet48"]
download_url = "https://github.com/scripthookvdotnet/scripthookvdotnet/releases/download/v3.6.0/ScriptHookVDotNet.zip"

